<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="50" height="50">
  <!-- Cream background matching the app's cream token -->
  <rect width="50" height="50" rx="6" fill="#F4EFE4"/>

  <!-- P-pentomino (red): cells (0,0) (1,0) (0,1) (1,1) (0,2) — fills top-left of a 4x4 grid -->
  <path d="M 5 5 H 25 V 25 H 15 V 35 H 5 Z"
        fill="#DC4E3A" stroke="#8C2D20" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- L-pentomino (green): cells (2,0) (2,1) (2,2) (2,3) (3,3) — fits snug along P's right edge -->
  <path d="M 25 5 H 35 V 35 H 45 V 45 H 25 Z"
        fill="#5FC04E" stroke="#3A6F2C" stroke-width="1.5" stroke-linejoin="round"/>
</svg>
